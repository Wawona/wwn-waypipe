name: ci
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  eval:
    name: flake eval (instantiation)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          determinate: true
      - uses: DeterminateSystems/flakehub-cache-action@v3

      - name: fragment evaluates
        run: nix eval .#registryFragment --apply builtins.attrNames
      - name: waypipe instantiates (no build)
        run: |
          nix eval --raw .#packages.aarch64-darwin.waypipe-ios.drvPath
          nix eval --raw .#packages.aarch64-darwin.waypipe-macos.drvPath

  build:
    name: build waypipe
    runs-on: macos-15
    needs: eval
    steps:
      - uses: actions/checkout@v5
      - uses: DeterminateSystems/nix-installer-action@main
        with:
          determinate: true
      - uses: DeterminateSystems/flakehub-cache-action@v3

      - run: nix build .#packages.aarch64-darwin.waypipe-macos -L
